context:
  name: apache-airflow-providers-cncf-kubernetes
  version: 10.16.1

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/apache_airflow_providers_cncf_kubernetes-${{ version }}.tar.gz
  sha256: 1f36b0ec18e97b13ac36373a8c48e4d38e9f8f227a963bbea144c383bc904419

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core ==3.12.0
  run:
    - python >=${{ python_min }}
    - aiofiles >=23.2.0
    - apache-airflow >=2.11.0
    - apache-airflow-providers-common-compat >=1.14.1
    - asgiref >=3.5.2
    - cryptography >=44.0.3
    - python-kubernetes >=35.0.0,<36.0.0
    - urllib3 >=2.1.0,!=2.6.0
    - kubernetes_asyncio >=32.0.0,<36.0.0
tests:
  - python:
      imports:
        - airflow.providers.cncf.kubernetes
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - '*'

about:
  homepage: https://github.com/apache/airflow/
  summary: Provider package apache-airflow-providers-cncf-kubernetes for Apache Airflow
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE
  documentation: https://airflow.apache.org/docs/apache-airflow-providers-cncf-kubernetes/stable/index.html
  repository: https://github.com/apache/airflow/

extra:
  recipe-maintainers:
    - xylar
